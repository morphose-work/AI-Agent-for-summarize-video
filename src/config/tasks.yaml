summarizer_task:
  description: >
    Проанализируй предоставленный текст субтитров из видео: {url}
    
    Выдели: главную тему, ключевые инсайты (минимум 5 тезисов сжато) и практические выводы автора. Пиши строго по делу, без лирики и приветствий.
  expected_output: >
    Сжатый структурированный черновик анализа контента на русском языке.
  agent: summarizator

editor_task:
  description: >
    Возьми черновик анализа от Аналитика контента и распредели информацию по полям модели VideoSummarySchema.
    Убедись, что язык заполнения русский, формулировки лаконичны, а структура строго соблюдена. Не добавляй лишних данных от себя.
  expected_output: >
    Валидированный Pydantic-объект VideoSummarySchema, заполненный на русском языке.
  agent: editor
  context: [summarizer_task]